<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zap Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-50: #eff6ff;
      --brand-100: #dbeafe;
      --brand-500: #3b82f6;
      --brand-600: #2563eb;
      --brand-700: #1d4ed8;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-900: #0f172a;
      --radius: 18px;
      --shadow-lg: 0 20px 40px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      color: var(--slate-700);
      background: radial-gradient(circle at 8% 6%, rgba(59, 130, 246, 0.12), transparent 40%),
                  radial-gradient(circle at 92% 12%, rgba(37, 99, 235, 0.14), transparent 38%),
                  var(--slate-50);
      min-height: 100vh;
      padding: 32px 20px 60px;
      display: flex;
      justify-content: center;
    }

    .page {
      width: min(960px, 100%);
      display: grid;
      gap: 24px;
      animation: fadeUp 0.45s ease-out;
    }

    header {
      display: grid;
      gap: 8px;
      text-align: center;
    }

    header span {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-600);
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 600;
      color: var(--slate-900);
    }

    header p {
      margin: 0;
      font-size: 1rem;
      color: var(--slate-600);
    }

    .card {
      background: #ffffff;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 28px;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 500;
      color: var(--slate-700);
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      border: 1px solid var(--slate-200);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: "Inter", sans-serif;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    input:focus {
      border-color: var(--brand-500);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      background: var(--brand-600);
      color: white;
      transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    button:hover {
      background: var(--brand-700);
      transform: translateY(-1px);
    }

    button[disabled] {
      opacity: 0.7;
      cursor: wait;
      transform: none;
    }

    .ghost-btn {
      background: var(--slate-100);
      color: var(--slate-700);
      box-shadow: none;
    }

    .ghost-btn:hover {
      background: var(--slate-200);
    }

    .result-card {
      border: 1px solid var(--slate-200);
      border-radius: 16px;
      padding: 18px;
      background: var(--slate-50);
      animation: fadeUp 0.25s ease-out;
    }

    .status {
      margin: 0 0 8px;
      font-weight: 600;
      color: var(--slate-900);
    }

    .status.ok { color: #0f766e; }
    .status.fail { color: #b42318; }

    .mono {
      font-size: 0.9rem;
      color: var(--slate-600);
      word-break: break-word;
    }

    .match-list {
      margin: 12px 0 0;
      padding-left: 18px;
    }

    .match-list li {
      margin: 6px 0;
      font-size: 0.9rem;
    }

    .match-meta {
      margin: 2px 0 0;
      font-size: 0.78rem;
      color: var(--slate-600);
    }

    .logs {
      margin-top: 12px;
      max-height: 240px;
      overflow: auto;
      padding: 12px;
      border-radius: 12px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.78rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 760px) {
      .grid-2 { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <span>Zap Finder</span>
      <h1>Buscando no Zap Imoveis</h1>
      <p>Defina os filtros essenciais e rode a busca em lotes automaticamente.</p>
    </header>

    <section class="card">
      <form id="search-form">
        <div class="grid-2">
          <label>
            Endereco (parcial)
            <input id="address" name="address" type="text" value="{{ default_address }}" placeholder="Avenida Lucio Costa, 3602">
          </label>
          <label>
            Condominio
            <input id="condominium" name="condominium" type="text" placeholder="Costa Del Sol">
          </label>
        </div>

        <label>
          Criado nos ultimos (dias)
          <input
            id="recent_days"
            name="recent_days"
            type="number"
            min="0"
            max="30"
            step="1"
            inputmode="numeric"
            pattern="\d{1,2}"
            maxlength="2"
            placeholder="7"
          >
        </label>

        <div class="actions">
          <button id="submit-btn" type="submit">Buscar agora</button>
          <button id="cancel-btn" type="button" class="ghost-btn" style="display:none;">Parar</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2 style="margin:0 0 12px;font-size:1.1rem;color:var(--slate-900);">Resultado</h2>
      <div id="result"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById("search-form");
    const resultEl = document.getElementById("result");
    const submitBtn = document.getElementById("submit-btn");
    const recentDaysInput = document.getElementById("recent_days");
    const cancelBtn = document.getElementById("cancel-btn");
    const BACKEND_URL = "/api/search";

    const FIXED_LISTING_URL = "https://www.zapimoveis.com.br/venda/apartamentos/rj+rio-de-janeiro/avenida-lucio-costa/?onde=%2CRio+de+Janeiro%2CRio+de+Janeiro%2CZona+Oeste%2CBarra+da+Tijuca%2CAvenida+L%C3%BAcio+Costa%2C%2Cstreet%2CBR%3ERio+de+Janeiro%3ENULL%3ERio+de+Janeiro%3EZona+Oeste%3EBarra+da+Tijuca%2C-23.011213%2C-43.372959%2C&tipos=apartamento_residencial&precoMaximo=9000000&precoMinimo=2500000&ordem=MOST_RECENT";
    const FIXED_TIMEOUT = 60000;
    const FIXED_START_PAGE = 1;
    const FIXED_HEADLESS = false;

    let cancelRequested = false;

    function sanitizeRecentDaysInput() {
      let digits = String(recentDaysInput.value || "").replace(/\D/g, "");
      if (digits.length > 2) {
        digits = digits.slice(0, 2);
      }
      if (digits !== "" && Number(digits) > 30) {
        digits = "30";
      }
      recentDaysInput.value = digits;
    }

    recentDaysInput.addEventListener("input", sanitizeRecentDaysInput);

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderLoading() {
      resultEl.innerHTML = `
        <div class="result-card">
          <p class="status">Executando busca...</p>
          <p class="mono">Enviando requisicao para o backend.</p>
        </div>
      `;
    }

    function renderBatchStatus(batchIndex, startPage, message) {
      resultEl.innerHTML = `
        <div class="result-card">
          <p class="status">Lote ${batchIndex}</p>
          <p class="mono">Pagina inicial do lote: ${startPage}</p>
          <p class="mono">${escapeHtml(message || "Executando...")}</p>
        </div>
      `;
    }

    function renderLoopSummary(summary) {
      const logsBlock = summary.logs ? `<div class="logs">${escapeHtml(summary.logs)}</div>` : "";
      const matchesBlock = summary.matches.length
        ? `
          <p class="mono">Matches encontrados: ${summary.matches.length}</p>
          <ol class="match-list">
            ${summary.matches.map((item) => `
              <li>
                <a href="${escapeHtml(item.property_url || "")}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.property_url || "")}</a>
                <p class="match-meta">listing_id: ${escapeHtml(item.listing_id || "-")}</p>
                <p class="match-meta">endereco: ${escapeHtml(item.address_extracted || "nao informado")}</p>
                <p class="match-meta">address_match: ${escapeHtml(String(item.address_match ?? false))}</p>
                <p class="match-meta">condominium_match: ${escapeHtml(String(item.condominium_match ?? false))}</p>
              </li>
            `).join("")}
          </ol>
        `
        : `<p class="mono">Nenhum match encontrado nos lotes.</p>`;

      resultEl.innerHTML = `
        <div class="result-card">
          <p class="status ok">Execucao concluida</p>
          <p class="mono">Lotes executados: ${summary.batches}</p>
          <p class="mono">Paginas processadas: ${summary.pagesProcessed}</p>
          <p class="mono">Imoveis visitados: ${summary.visited}</p>
          ${matchesBlock}
          ${logsBlock}
        </div>
      `;
    }

    function renderError(message) {
      resultEl.innerHTML = `
        <div class="result-card">
          <p class="status fail">Falha na requisicao</p>
          <p class="mono">${escapeHtml(message)}</p>
        </div>
      `;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;
      cancelBtn.style.display = "inline-flex";
      cancelBtn.disabled = false;
      cancelRequested = false;
      renderLoading();

      const recentDaysValue = String(recentDaysInput.value || "").trim();
      const addressValue = String(document.getElementById("address").value || "").trim();
      const condominiumValue = String(document.getElementById("condominium").value || "").trim();

      if (!addressValue && !condominiumValue && recentDaysValue === "") {
        renderError("Preencha ao menos um criterio: endereco, condominio ou criado nos ultimos (dias)." );
        submitBtn.disabled = false;
        return;
      }

      if (recentDaysValue !== "") {
        if (!/^\d{1,2}$/.test(recentDaysValue)) {
          renderError("recent_days deve ter no maximo 2 digitos inteiros.");
          submitBtn.disabled = false;
          return;
        }
        const recentNumber = Number(recentDaysValue);
        if (!Number.isInteger(recentNumber) || recentNumber < 0 || recentNumber > 30) {
          renderError("recent_days deve ser um inteiro entre 0 e 30.");
          submitBtn.disabled = false;
          return;
        }
      }

      const payload = {
        listing_url: FIXED_LISTING_URL,
        address: addressValue,
        condominium: condominiumValue,
        headless: FIXED_HEADLESS,
        recent_days: recentDaysValue,
        timeout: FIXED_TIMEOUT,
        start_page: FIXED_START_PAGE,
      };

      try {
        let nextPage = Number(payload.start_page || 1);
        let batchIndex = 0;
        let totalPages = 0;
        let totalVisited = 0;
        const matchMap = new Map();
        const allLogs = [];

        while (!cancelRequested) {
          batchIndex += 1;
          renderBatchStatus(batchIndex, nextPage, "Executando lote...");

          const batchPayload = { ...payload, start_page: nextPage };
          const response = await fetch(BACKEND_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(batchPayload),
          });
          let data = {};
          try {
            data = await response.json();
          } catch (parseError) {
            data = {};
          }
          if (!response.ok || data.status === "error") {
            const message = data.error_message || data.error || data.message || `HTTP ${response.status}`;
            throw new Error(message);
          }

          totalPages += Number(data.pages_processed || data.pages_scanned || 0);
          totalVisited += Number(data.visited_properties || 0);
          if (Array.isArray(data.logs)) {
            allLogs.push(`----- lote ${batchIndex} -----`);
            allLogs.push(...data.logs);
          }

          if (Array.isArray(data.matches)) {
            data.matches.forEach((item) => {
              const key = item.listing_id || item.property_url;
              if (!key) return;
              if (!matchMap.has(key)) {
                matchMap.set(key, item);
              }
            });
          }

          if (!data.has_more_pages || !data.next_start_page) {
            break;
          }

          nextPage = Number(data.next_start_page);

          const waitSeconds = Math.floor(Math.random() * (90 - 45 + 1)) + 45;
          renderBatchStatus(batchIndex, nextPage, `Aguardando ${waitSeconds}s para o proximo lote...`);
          for (let i = 0; i < waitSeconds; i += 1) {
            if (cancelRequested) break;
            await new Promise((resolve) => setTimeout(resolve, 1000));
          }
        }

        if (cancelRequested) {
          renderError("Execucao interrompida pelo usuario.");
        } else {
          renderLoopSummary({
            batches: batchIndex,
            pagesProcessed: totalPages,
            visited: totalVisited,
            matches: Array.from(matchMap.values()),
            logs: allLogs.join("\n"),
          });
        }
      } catch (error) {
        renderError(error.message || String(error));
      } finally {
        submitBtn.disabled = false;
        cancelBtn.disabled = true;
        cancelBtn.style.display = "none";
      }
    });

    cancelBtn.addEventListener("click", () => {
      cancelRequested = true;
      cancelBtn.disabled = true;
    });
  </script>
</body>
</html>
